<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Help Centre — booking, cancellations & member rates | OzBookings</title>
  <meta name="description" content="OzBookings help centre — how booking works, payments, cancellations & refunds, member rates and experiences. Answers in English and 简体中文.">
  <link rel="canonical" href="https://ozbookings.com/help.html">
  <meta name="robots" content="index, follow">
  <link rel="stylesheet" href="styles.css?v=20260703b">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="icon" href="/favicon.svg">
  <meta name="theme-color" content="#14171A">
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"How do I book a stay?","acceptedAnswer":{"@type":"Answer","text":"Search your destination and dates, choose a room, enter your guest details, and pay securely at checkout. Your booking reference is issued instantly and emailed to you."}},{"@type":"Question","name":"Is my payment secure?","acceptedAnswer":{"@type":"Answer","text":"Yes. Card payments are handled by our booking partner's PCI-compliant payment system. OzBookings never stores your full card number."}},{"@type":"Question","name":"Can I cancel my booking?","acceptedAnswer":{"@type":"Answer","text":"Every rate shows its cancellation policy before you book. Free-cancellation rates can be cancelled without charge up to the deadline shown. Non-refundable rates cannot be changed or refunded, except where required by law."}},{"@type":"Question","name":"When will I get my refund?","acceptedAnswer":{"@type":"Answer","text":"Approved refunds are returned to your original payment method, typically within 5 to 10 business days, subject to the property and your bank."}},{"@type":"Question","name":"What is an OzBookings account?","acceptedAnswer":{"@type":"Answer","text":"A free account that unlocks member-only rates on eligible stays, saves your trips, and speeds up checkout. Guest checkout always works too."}},{"@type":"Question","name":"How do experiences work?","acceptedAnswer":{"@type":"Answer","text":"We show top-rated tours and activities from our partner Viator (a Tripadvisor company). You browse on OzBookings and complete the booking securely on Viator. Prices are the same as booking Viator directly."}}]}</script>
  <style>
    .help-top{padding-top:120px;padding-bottom:20px}
    .help-hero{max-width:52ch}
    .help-hero h1{font-size:clamp(32px,5vw,56px);line-height:1.04;margin-top:14px}
    .help-hero p{color:var(--tx2);font-size:clamp(15px,1.5vw,18px);margin-top:14px}
    .faq-wrap{padding-bottom:100px}
    .faq-group{margin-top:44px}
    .faq-group-h{display:flex;align-items:center;gap:12px;margin-bottom:16px}
    .faq-group-h .ic{width:42px;height:42px;border-radius:50%;background:var(--ac-l);color:var(--ac);display:grid;place-items:center;font-size:21px}
    .faq-group-h h2{font-size:21px}
    .faq{border:1px solid var(--bd);border-radius:var(--ri);background:var(--bg-el);overflow:hidden;margin-bottom:10px;transition:box-shadow .4s var(--ease)}
    .faq.open{box-shadow:var(--s1)}
    .faq-q{display:flex;align-items:center;justify-content:space-between;gap:16px;width:100%;text-align:left;background:transparent;border:0;cursor:pointer;padding:18px 20px;font-family:var(--sans);font-size:15.5px;font-weight:600;color:var(--tx)}
    .faq-q .pm{width:26px;height:26px;flex-shrink:0;border-radius:50%;background:var(--bg-sub);display:grid;place-items:center;font-size:14px;transition:transform .4s var(--ease),background .4s}
    .faq.open .faq-q .pm{transform:rotate(45deg);background:var(--ac);color:#fff}
    .faq-a{max-height:0;overflow:hidden;transition:max-height .45s var(--ease)}
    .faq-a p{color:var(--tx2);font-size:14.5px;line-height:1.7;padding:0 20px 20px}
    .help-cta{margin-top:60px;background:var(--tx);border-radius:var(--rc);padding:clamp(28px,4vw,48px);color:#fff;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
    .help-cta h3{color:#fff;font-size:clamp(22px,3vw,30px);max-width:20ch}
    .help-cta p{color:rgba(255,255,255,.7);font-size:14px;margin-top:8px}
    .help-cta .btn-coral{background:var(--ac-strong)}
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div id="nav-mount"></div>

  <main class="wrap help-top">
    <div class="help-hero reveal">
      <span class="eyebrow" id="eyebrow">Help centre</span>
      <h1 id="h1">How can we help?</h1>
      <p id="lede">Answers on booking, payments, cancellations, member rates and experiences. Still stuck? Our team is one email away.</p>
    </div>
  </main>

  <div class="wrap faq-wrap"><div id="faq"></div>
    <div class="help-cta reveal">
      <div><h3 id="ctaH">Still need a hand?</h3><p id="ctaP">Email our team and we’ll reply within one business day.</p></div>
      <a class="btn btn-coral" id="ctaBtn" href="contact.html"><span>Contact us</span><span class="btn-i"><i class="ph-bold ph-envelope-simple"></i></span></a>
    </div>
  </div>

  <div id="footer-mount"></div>

  <script src="shared.js?v=20260703b"></script>
  <script>
    const L=(en,zh)=>BA.t(en,zh);
    document.getElementById('nav-mount').innerHTML=BA.renderNav('');
    document.getElementById('footer-mount').innerHTML=BA.renderFooter();

    document.getElementById('eyebrow').textContent=L('Help centre','帮助中心');
    document.getElementById('h1').textContent=L('How can we help?','有什么可以帮您？');
    document.getElementById('lede').textContent=L('Answers on booking, payments, cancellations, member rates and experiences. Still stuck? Our team is one email away.','关于预订、支付、取消、会员价与体验活动的解答。仍有疑问？我们的团队一封邮件即可联系。');
    document.getElementById('ctaH').textContent=L('Still need a hand?','还需要帮助？');
    document.getElementById('ctaP').textContent=L('Email our team and we’ll reply within one business day.','给我们发邮件，我们将在一个工作日内回复。');
    document.getElementById('ctaBtn').querySelector('span').textContent=L('Contact us','联系我们');

    const GROUPS=[
      {ic:'ph-credit-card', t:{en:'Booking & payment',zh:'预订与支付'}, qa:[
        {q:{en:'How do I book a stay?',zh:'如何预订住宿？'},a:{en:'Search your destination and dates, choose a room, enter your guest details, and pay securely at checkout. Your booking reference is issued instantly and emailed to you.',zh:'搜索目的地与日期，选择房型，填写入住人信息，并在结账页安全支付。预订确认号将即时生成并通过邮件发送给您。'}},
        {q:{en:'Is my payment secure?',zh:'我的支付安全吗？'},a:{en:'Yes. Card payments are handled by our booking partner’s PCI-compliant payment system. OzBookings never stores your full card number.',zh:'安全。银行卡支付由我们预订合作伙伴的 PCI 合规支付系统处理。OzBookings 绝不存储您的完整卡号。'}},
        {q:{en:'What currency are prices shown in?',zh:'价格以什么货币显示？'},a:{en:'Australian dollars (AUD). Prices include applicable taxes and fees unless noted at checkout.',zh:'澳大利亚元（AUD）。除结账页另有说明外，价格已包含适用的税费。'}},
        {q:{en:'Do I pay OzBookings or the hotel?',zh:'我付款给 OzBookings 还是酒店？'},a:{en:'You pay securely at checkout through our booking partner, and your reservation is confirmed directly with the property.',zh:'您在结账页通过我们的预订合作伙伴安全付款，预订将直接与酒店确认。'}}
      ]},
      {ic:'ph-arrow-counter-clockwise', t:{en:'Cancellations & refunds',zh:'取消与退款'}, qa:[
        {q:{en:'Can I cancel my booking?',zh:'我可以取消预订吗？'},a:{en:'Every rate shows its cancellation policy before you book. Free-cancellation rates can be cancelled without charge up to the deadline shown on the rate. Non-refundable rates cannot be changed or refunded, except where required by law.',zh:'每种房价在预订前都会显示其取消政策。免费取消房价可在房价所示截止时间前免费取消；不可退款房价不可更改或退款（法律另有规定的除外）。'}},
        {q:{en:'How do I cancel or change a booking?',zh:'如何取消或更改预订？'},a:{en:'Email support@ozbookings.com with your booking reference, or use the manage-booking link in your confirmation email.',zh:'请将您的预订确认号发送至 support@ozbookings.com，或使用确认邮件中的管理预订链接。'}},
        {q:{en:'When will I get my refund?',zh:'退款多久到账？'},a:{en:'Approved refunds are returned to your original payment method, typically within 5–10 business days, subject to the property and your bank.',zh:'经批准的退款将退回至您的原支付方式，通常在 5–10 个工作日内到账，具体以酒店和银行为准。'}}
      ]},
      {ic:'ph-user-circle', t:{en:'Member rates & accounts',zh:'会员价与账户'}, qa:[
        {q:{en:'What is an OzBookings account?',zh:'OzBookings 账户是什么？'},a:{en:'A free account that unlocks member-only rates on eligible stays, saves your trips, and speeds up checkout.',zh:'免费账户，可解锁符合条件住宿的会员专享价、保存您的行程，并加快结账。'}},
        {q:{en:'Do I have to create an account?',zh:'我必须注册账户吗？'},a:{en:'No. Guest checkout always works. An account simply unlocks extra savings and saved trips — it’s optional and free.',zh:'不必。访客结账始终可用。账户只是解锁额外优惠与行程收藏——可选且免费。'}},
        {q:{en:'How do I see member prices?',zh:'如何查看会员价？'},a:{en:'Sign in, and member prices appear automatically on eligible properties throughout the site.',zh:'登录后，会员价将在全站符合条件的酒店上自动显示。'}}
      ]},
      {ic:'ph-ticket', t:{en:'Experiences & activities',zh:'体验与活动'}, qa:[
        {q:{en:'How do experiences work?',zh:'体验活动如何运作？'},a:{en:'We show top-rated tours and activities from our partner Viator (a Tripadvisor company). You browse everything on OzBookings and complete the booking securely on Viator. Prices are the same as booking Viator directly.',zh:'我们展示来自合作伙伴 Viator（Tripadvisor 旗下公司）的高评分行程与活动。您可在 OzBookings 浏览全部内容，并在 Viator 上安全完成预订。价格与直接在 Viator 预订相同。'}},
        {q:{en:'Can I cancel an experience?',zh:'我可以取消体验活动吗？'},a:{en:'Most experiences offer free cancellation (shown on each). Experience bookings and cancellations are managed by Viator, per the policy on your ticket.',zh:'大多数体验支持免费取消（各产品页均有标注）。体验的预订与取消由 Viator 按您票券上的政策管理。'}}
      ]},
      {ic:'ph-headset', t:{en:'Contact & support',zh:'联系与支持'}, qa:[
        {q:{en:'How do I reach OzBookings?',zh:'如何联系 OzBookings？'},a:{en:'Email support@ozbookings.com and we’ll reply within one business day. Support hours are Mon–Sun, 9am–9pm AEST.',zh:'请发送邮件至 support@ozbookings.com，我们将在一个工作日内回复。客服时间为周一至周日，澳东时间 9:00–21:00。'}},
        {q:{en:'Is OzBookings an Australian business?',zh:'OzBookings 是澳大利亚企业吗？'},a:{en:'Yes. OzBookings is an independently operated Australian travel service. Live inventory and pricing are powered by LiteAPI (Nuitee); experiences by Viator.',zh:'是的。OzBookings 是一家独立运营的澳大利亚旅游服务商。实时房源与价格由 LiteAPI（Nuitee）提供，体验活动由 Viator 提供。'}}
      ]}
    ];

    function render(){
      let gi=0;
      document.getElementById('faq').innerHTML = GROUPS.map(g=>{
        const items=g.qa.map(x=>{
          const id='f'+(gi++);
          return `<div class="faq" id="${id}">
            <button class="faq-q" onclick="toggle('${id}')">${x.q[BA.lang]||x.q.en}<span class="pm"><i class="ph-bold ph-plus"></i></span></button>
            <div class="faq-a"><p>${x.a[BA.lang]||x.a.en}</p></div>
          </div>`;
        }).join('');
        return `<section class="faq-group reveal"><div class="faq-group-h"><span class="ic"><i class="ph-light ${g.ic}"></i></span><h2>${g.t[BA.lang]||g.t.en}</h2></div>${items}</section>`;
      }).join('');
      BA.init();
    }
    function toggle(id){
      const el=document.getElementById(id); const a=el.querySelector('.faq-a'); const open=el.classList.toggle('open');
      a.style.maxHeight = open ? a.scrollHeight+'px' : '0';
    }
    render();
  </script>
</body>
</html>
